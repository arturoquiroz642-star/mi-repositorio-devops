version: 0.0
os: linux
files:
  - source: mi-app.tar
    destination: /tmp/deploy-artifact
hooks:
  BeforeInstall:
    - location: scripts/stop_container.sh
      timeout: 60
  AfterInstall:
    - location: scripts/load_image.sh
      timeout: 180
  ApplicationStart:
    - location: scripts/start_container.sh
      timeout: 60